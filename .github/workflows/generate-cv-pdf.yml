name: Generate CV PDF

on:
  push:
    paths:
      - 'cv.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF from cv.html
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage'
              ]
            });
            const page = await browser.newPage();
            
            const htmlPath = path.resolve('cv.html');
            await page.goto(`file://${htmlPath}`, { waitUntil: 'networkidle0' });
            
            // Use a viewport width that matches your CV's natural width (e.g., 1200px)
            await page.setViewport({ width: 1200, height: 800, deviceScaleFactor: 1 });
            
            // Wait for any reflow
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // Get the full scroll height after viewport is set
            const scrollHeight = await page.evaluate(() => document.documentElement.scrollHeight);
            
            // Set viewport height to full scroll height to capture everything
            await page.setViewport({ width: 1200, height: scrollHeight, deviceScaleFactor: 2 });
            
            await page.pdf({
              path: 'cv.pdf',
              format: 'A4',
              printBackground: true,
              scale: 0.6,          // Adjust until content fits without clipping
              margin: { top: '0.4in', bottom: '0.4in', left: '0.4in', right: '0.4in' }
            });
            
            await browser.close();
            console.log('✅ PDF generated with scaling');
          })();
          EOF
              
      - name: Commit and push PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          if git diff --cached --quiet; then
            echo "No changes to PDF."
          else
            git commit -m "Auto-generate cv.pdf from cv.html"
            git push
          fi