name: Generate CV PDF

on:
  push:
    paths:
      - 'cv.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF from cv.html
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage'
              ]
            });
            const page = await browser.newPage();
            
            const htmlPath = path.resolve('cv.html');
            await page.goto(`file://${htmlPath}`, { waitUntil: 'networkidle0' });
            
            // Emulate screen media to preserve all styles
            await page.emulateMediaType('screen');
            
            // Get the full height of the content
            const bodyHandle = await page.$('body');
            const { width, height } = await bodyHandle.boundingBox();
            await bodyHandle.dispose();
            
            // Generate PDF with dynamic dimensions (A4 width, but height based on content)
            await page.pdf({
              path: 'cv.pdf',
              width: '8.27in',        // A4 width
              height: height + 40 + 'px', // Add small buffer
              printBackground: true,
              margin: { top: '0.4in', bottom: '0.4in', left: '0.4in', right: '0.4in' }
            });
            
            await browser.close();
            console.log('✅ PDF generated: cv.pdf');
          })();
          EOF
      - name: Commit and push PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          if git diff --cached --quiet; then
            echo "No changes to PDF."
          else
            git commit -m "Auto-generate cv.pdf from cv.html"
            git push
          fi